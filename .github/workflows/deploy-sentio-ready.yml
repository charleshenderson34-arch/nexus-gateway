name: Deploy Sentio Processor & D1 Schema

on:
  push:
    branches:
      - main
    paths:
      - 'src/processor/**'
      - 'schema/**'
      - '.github/workflows/deploy-sentio-ready.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm install -g @sentio/cli@latest
          npm install -g wrangler
          npm install

      - name: Initialize D1 Schema (nexus-provenance)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute nexus-provenance --file schema/schema.sql --remote
          echo "✓ D1 schema initialized successfully"

      - name: Deploy Sentio Processor
        env:
          SENTIO_API_KEY: ${{ secrets.SENTIO_API_KEY }}
          PROGRAM_ID: 8gxspbzkF2ooczEc2ASX8LtjeNa5vu6U89axod1jvg2L
          MERKLE_ROOT: 5c9f290231ce07d09f135d9b0c602bf5450d493e88ddbc89d5cbec1dad7fdf65
          EVENT_NAME: RecordBroadcast
        run: |
          # Change to the directory where you just created sentio.yaml
          cd src/processor
          
          # Inject project values into the processor
          sed -i 's/YOUR_PROGRAM_ID_HERE/'$PROGRAM_ID'/g' processor.ts
          sed -i 's/YOUR_MERKLE_ROOT_HERE/'$MERKLE_ROOT'/g' processor.ts
          sed -i 's/YOUR_EVENT_HERE/'$EVENT_NAME'/g' processor.ts
          
          # Deploy using the now-present config file
          sentio upload
          echo "✓ Sentio processor deployed successfully"
