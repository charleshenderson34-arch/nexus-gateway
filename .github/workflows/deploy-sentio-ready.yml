name: Deploy Sentio Processor & D1 Schema

on:
  push:
    branches:
      - main
    paths:
      - 'src/processor/**'
      - 'schema/**'
      - '.github/workflows/deploy-sentio-ready.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm install -g @sentio/cli@latest
          npm install -g wrangler
          npm install

      - name: Initialize D1 Schema (nexus-provenance)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute nexus-provenance --file schema/schema.sql --remote
          echo "✓ D1 schema initialized successfully"

      - name: Deploy Sentio Processor
        env:
          SENTIO_API_KEY: ${{ secrets.SENTIO_API_KEY }}
          PROGRAM_ID: 8gxspbzkF2ooczEc2ASX8LtjeNa5vu6U89axod1jvg2L
          MERKLE_ROOT: 5c9f290231ce07d09f135d9b0c602bf5450d493e88ddbc89d5cbec1dad7fdf65
          EVENT_NAME: RecordBroadcast
        run: |
          # 1. Create the project config file if it's missing
          if [ ! -f "src/processor/sentio.yaml" ]; then
            echo "project: 'nexus-noc'" > src/processor/sentio.yaml
            echo "network: 'solana-devnet'" >> src/processor/sentio.yaml
            echo "host: 'https://app.sentio.xyz'" >> src/processor/sentio.yaml
          fi

          # 2. Authenticate the CLI using the API key
          # This fixes the "No Credential found" error
          sentio login --api-key $SENTIO_API_KEY

          # 3. Navigate to the processor directory and upload
          cd src/processor
          sentio upload
          echo "✓ Sentio processor deployed successfully"

      - name: Verify Deployment Status
        env:
          SENTIO_API_KEY: ${{ secrets.SENTIO_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📊 Checking sync status..."
          wrangler d1 execute nexus-provenance \
            --command "SELECT COUNT(*) as total_synced, MAX(date) as latest_date FROM etoro_records WHERE synced_to_sentio=1;" \
            --remote

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Status Summary
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful"
            echo "🔐 Owner: tim@charleshendersonandhendfam.online"
          else
            echo "❌ Deployment failed - check API key validity"
          fi
